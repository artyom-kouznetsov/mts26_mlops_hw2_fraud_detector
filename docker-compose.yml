name: realtime-fraud-detector

x-app-environment: &app-environment
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_INPUT_TOPIC: transactions
  KAFKA_OUTPUT_TOPIC: scores
  DATABASE_URL: postgresql://${POSTGRES_USER:-fraud}:${POSTGRES_PASSWORD:-fraud}@postgres:5432/${POSTGRES_DB:-fraud}

services:
  kafka:
    image: apache/kafka:3.9.2
    hostname: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - kafka_data:/var/lib/kafka
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.2
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092
        --create --if-not-exists --topic transactions --partitions 1 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092
        --create --if-not-exists --topic scores --partitions 1 --replication-factor 1
    restart: "no"

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud}
      POSTGRES_USER: ${POSTGRES_USER:-fraud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped

  scorer:
    build: .
    command: ["python", "-u", "src/kafka_scorer.py"]
    environment:
      <<: *app-environment
      MODEL_PATH: /app/models/fraud_lgbm_pipeline.joblib
      SCORER_BATCH_SIZE: ${SCORER_BATCH_SIZE:-256}
      SCORER_BATCH_TIMEOUT_SECONDS: ${SCORER_BATCH_TIMEOUT_SECONDS:-1}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres-writer:
    build: .
    command: ["python", "-u", "src/postgres_writer.py"]
    environment:
      <<: *app-environment
      WRITER_BATCH_SIZE: ${WRITER_BATCH_SIZE:-500}
      WRITER_BATCH_TIMEOUT_SECONDS: ${WRITER_BATCH_TIMEOUT_SECONDS:-1}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  interface:
    build: .
    command:
      - streamlit
      - run
      - app/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
    environment:
      <<: *app-environment
      GRAFANA_PORT: ${GRAFANA_PORT:-3000}
      KAFKA_UI_PORT: ${KAFKA_UI_PORT:-8080}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-fraud}
      POSTGRES_USER: ${POSTGRES_USER:-fraud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
  postgres_data:
  grafana_data:
